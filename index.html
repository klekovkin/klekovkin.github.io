<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Юрій Клековкін — Сайт в розробці</title>
    <meta name="description" content="Сайт Юрія Клековкіна — незабаром тут з'явиться щось цікаве.">
    <meta name="author" content="Iurii Klekovkin">

    <link rel="icon" href="favicon.ico">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-primary: #2A9D8F;
            --color-bg: #F5F5F5;
            --color-text: #3B4252;
            --color-text-muted: #8B95A5;
            --color-donate: #E76F51;
            --color-donate-hover: #D45A3C;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #1A1D24;
                --color-text: #D8DEE9;
                --color-text-muted: #6B7894;
                --color-donate: #E76F51;
                --color-donate-hover: #F28A6E;
            }
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 520px;
        }

        .wip-badge {
            display: inline-block;
            background: var(--color-primary);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.35em 1em;
            border-radius: 4px;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--color-text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        .donate-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--color-donate);
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.85em 1.8em;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .donate-link:hover {
            background: var(--color-donate-hover);
        }

        .donate-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="wip-badge">Work in Progress</span>
        <h1>Юрій Клековкін</h1>
        <p class="subtitle">Сайт в розробці. Незабаром тут з'явиться щось цікаве.</p>
        <a href="donate.html" class="donate-link">
            <svg viewBox="0 0 512 512"><path d="M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z"/></svg>
            Підтримати 159 ОМБР
        </a>
    </div>
</body>
</html>
