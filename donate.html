document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Unbounded';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"d01756a4-348b-489f-ac54-49d8fffcaf77\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    /* Heraldic palette from 159 ОМБР emblem */\n    --navy:        #1b2a6b;   /* shield field */\n    --navy-deep:   #0e1847;   /* deeper, for text on gold / shadow */\n    --navy-ink:    #0a1235;   /* deepest */\n    --navy-soft:   #e8ebf5;   /* tint */\n    --gold:        #e3a42a;   /* knot + border */\n    --gold-warm:   #f0b850;\n    --gold-deep:   #8a5f10;\n    --gold-soft:   #fbf1d9;\n\n    --ink:         #0a1235;\n    --ink-soft:    #2a355f;\n    --ink-mute:    #6b7298;\n    --paper:       #fbfaf5;   /* warm off-white, heraldic */\n    --paper-tint:  #f2efe4;\n    --rule:        #d9d4bf;\n    --rule-strong: #a69e7d;\n\n    --f-display: 'Unbounded', system-ui, sans-serif;\n    --f-body:    'Manrope', system-ui, sans-serif;\n    --f-mono:    'JetBrains Mono', ui-monospace, monospace;\n  }\n\n  * { box-sizing: border-box; }\n  html, body {\n    margin: 0; padding: 0;\n    background: var(--paper);\n    color: var(--ink);\n    font-family: var(--f-body);\n    -webkit-font-smoothing: antialiased;\n    -moz-osx-font-smoothing: grayscale;\n  }\n\n  /* ====== Top bar ====== */\n  .top {\n    max-width: 1240px;\n    margin: 0 auto;\n    padding: 22px 32px 18px;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    gap: 24px;\n    flex-wrap: wrap;\n  }\n  @media (max-width: 720px) {\n    .top { padding: 18px 20px 14px; gap: 14px; }\n    .meta { font-size: 11px; gap: 14px; }\n  }\n  .brand { display: flex; align-items: center; gap: 16px; }\n  .brand-emblem {\n    width: 58px; height: auto; display: block;\n    filter: drop-shadow(0 2px 6px rgba(14,24,71,0.2));\n  }\n  .brand-name {\n    font-family: var(--f-display);\n    font-weight: 700;\n    font-size: 15px;\n    letter-spacing: -0.01em;\n    line-height: 1.2;\n    color: var(--navy-ink);\n  }\n  .brand-sub {\n    font-family: var(--f-mono);\n    font-size: 11px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n    margin-top: 3px;\n  }\n  .meta {\n    font-family: var(--f-mono);\n    font-size: 12px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n    display: flex;\n    gap: 22px;\n    align-items: center;\n  }\n  .meta b { color: var(--navy); font-weight: 700; }\n  .meta .dot {\n    width: 8px; height: 8px; border-radius: 50%;\n    background: var(--gold);\n    display: inline-block;\n    margin-right: 8px;\n    animation: pulse 1.8s ease-in-out infinite;\n    box-shadow: 0 0 0 3px var(--gold-soft);\n  }\n  @keyframes pulse {\n    0%,100% { box-shadow: 0 0 0 3px var(--gold-soft); }\n    50%    { box-shadow: 0 0 0 6px var(--gold-soft); }\n  }\n\n  /* ====== Hero — navy block with gold emblem watermark ====== */\n  .hero {\n    background: var(--navy);\n    color: #fff;\n    position: relative;\n    overflow: hidden;\n    border-top: 4px solid var(--gold);\n  }\n  .hero-inner {\n    max-width: 1240px;\n    margin: 0 auto;\n    padding: 72px 32px 72px;\n    position: relative;\n    z-index: 2;\n  }\n  @media (max-width: 720px) {\n    .hero-inner { padding: 48px 20px 48px; }\n  }\n  .hero-watermark {\n    position: absolute;\n    right: -60px; top: 50%;\n    transform: translateY(-50%);\n    width: 520px;\n    opacity: 0.12;\n    z-index: 1;\n    pointer-events: none;\n  }\n  @media (max-width: 900px) {\n    .hero-watermark { right: -120px; width: 380px; opacity: 0.08; }\n  }\n  .crumbs {\n    font-family: var(--f-mono);\n    font-size: 12px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--gold);\n    margin-bottom: 28px;\n    font-weight: 600;\n  }\n  .crumbs span { color: rgba(255,255,255,0.4); margin: 0 10px; }\n  .title {\n    font-family: var(--f-display);\n    font-weight: 700;\n    font-size: clamp(44px, 8vw, 108px);\n    line-height: 0.92;\n    letter-spacing: -0.035em;\n    margin: 0 0 16px;\n    color: #fff;\n    max-width: 16ch;\n  }\n  .title .accent { color: var(--gold); }\n  .lede {\n    font-family: var(--f-body);\n    font-size: clamp(16px, 1.4vw, 19px);\n    line-height: 1.55;\n    color: rgba(255,255,255,0.85);\n    max-width: 56ch;\n    margin: 24px 0 0;\n  }\n  .lede b { color: #fff; font-weight: 700; }\n  .lede .hl { color: var(--gold); font-weight: 700; }\n\n  /* ====== Main two-column (lifted over the hero's edge) ====== */\n  .main-wrap {\n    background: var(--paper);\n    position: relative;\n    padding-bottom: 8px;\n  }\n  .main {\n    max-width: 1240px;\n    margin: 40px auto 0;\n    padding: 0 32px;\n    display: grid;\n    grid-template-columns: 1fr;\n    gap: 28px;\n    align-items: start;\n    position: relative;\n    z-index: 3;\n  }\n  @media (max-width: 720px) {\n    .main { padding: 0 20px; margin-top: 28px; gap: 20px; }\n  }\n\n  /* Donate card */\n  .card {\n    background: var(--paper);\n    border: 1px solid var(--rule);\n    border-radius: 6px;\n    padding: 32px;\n    box-shadow: 0 12px 40px rgba(14,24,71,0.10), 0 2px 6px rgba(14,24,71,0.06);\n    position: relative;\n  }\n  .card::before {\n    content: '';\n    position: absolute;\n    left: -1px; top: -1px; right: -1px;\n    height: 4px;\n    background: var(--gold);\n    border-radius: 6px 6px 0 0;\n  }\n  .card-head {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    gap: 14px;\n    margin-bottom: 22px;\n  }\n  .card-title {\n    font-family: var(--f-display);\n    font-weight: 700;\n    font-size: 24px;\n    letter-spacing: -0.02em;\n    margin: 0;\n    color: var(--navy-ink);\n  }\n  .currency {\n    font-family: var(--f-mono);\n    font-size: 12px;\n    letter-spacing: 0.14em;\n    padding: 7px 14px;\n    border: 1px solid var(--rule-strong);\n    border-radius: 999px;\n    color: var(--ink-soft);\n    font-weight: 700;\n    cursor: pointer;\n    background: transparent;\n  }\n  .currency:hover { border-color: var(--navy); color: var(--navy); }\n\n  /* Subscription tabs — kept in DOM, hidden */\n  .tabs {\n    display: flex;\n    padding: 4px;\n    background: var(--paper-tint);\n    border: 1px solid var(--rule);\n    border-radius: 999px;\n    margin-bottom: 22px;\n  }\n  .tabs.hidden { display: none; }\n  .tab {\n    flex: 1;\n    padding: 12px 14px;\n    border: 0;\n    background: transparent;\n    border-radius: 999px;\n    font-family: var(--f-body);\n    font-size: 14px;\n    font-weight: 600;\n    color: var(--ink-mute);\n    cursor: pointer;\n  }\n  .tab.active {\n    background: var(--navy);\n    color: #fff;\n  }\n\n  .amount {\n    position: relative;\n    padding: 16px 0 14px;\n    border-bottom: 2px solid var(--navy-ink);\n    margin-bottom: 20px;\n  }\n  .amount-input {\n    font-family: var(--f-display);\n    font-weight: 700;\n    font-size: clamp(44px, 7vw, 72px);\n    line-height: 1;\n    letter-spacing: -0.035em;\n    border: 0;\n    background: transparent;\n    width: 100%;\n    color: var(--navy-ink);\n    outline: none;\n    padding: 0;\n    font-variant-numeric: tabular-nums;\n  }\n  .amount-suffix {\n    position: absolute;\n    right: 0;\n    top: 22px;\n    font-family: var(--f-mono);\n    font-size: 14px;\n    letter-spacing: 0.1em;\n    color: var(--gold-deep);\n    font-weight: 700;\n  }\n\n  .presets {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 10px;\n    margin-bottom: 22px;\n  }\n  .preset {\n    padding: 14px 10px;\n    border: 1px solid var(--rule-strong);\n    border-radius: 999px;\n    background: var(--paper);\n    font-family: var(--f-body);\n    font-size: 14px;\n    font-weight: 600;\n    color: var(--navy-ink);\n    cursor: pointer;\n    transition: all 160ms ease;\n    font-variant-numeric: tabular-nums;\n  }\n  .preset .curr { color: var(--ink-mute); font-weight: 500; margin-left: 4px; font-size: 12px; }\n  .preset:hover { border-color: var(--navy); color: var(--navy); }\n  .preset.active {\n    background: var(--gold);\n    border-color: var(--gold);\n    color: var(--navy-ink);\n  }\n  .preset.active .curr { color: var(--gold-deep); }\n\n  .cta {\n    width: 100%;\n    padding: 18px;\n    border: 0;\n    border-radius: 4px;\n    background: var(--navy);\n    color: #fff;\n    font-family: var(--f-body);\n    font-size: 15px;\n    font-weight: 700;\n    letter-spacing: 0.02em;\n    cursor: pointer;\n    transition: all 160ms ease;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 10px;\n    text-decoration: none;\n    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.18);\n  }\n  .cta:hover { background: var(--gold); color: #fff; transform: translateY(-2px); box-shadow: 0 10px 26px -8px rgba(138,95,16,0.55), 0 3px 6px rgba(10,18,53,0.14); }\n  .cta .arr { color: var(--gold); font-size: 18px; transition: transform 160ms ease; }\n  .cta:hover .arr { transform: translateX(3px); }\n\n  .cta-sub {\n    text-align: center;\n    font-family: var(--f-mono);\n    font-size: 11px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n    margin-top: 14px;\n  }\n\n  /* Goal panel — gold on navy-ink */\n  .goal {\n    background: var(--navy-ink);\n    color: #fff;\n    border-radius: 6px;\n    padding: 40px 44px 36px;\n    position: relative;\n    overflow: hidden;\n    border: 1px solid var(--navy-deep);\n  }\n  @media (max-width: 720px) {\n    .goal { padding: 32px 26px 28px; }\n  }\n  .goal::before {\n    /* Soft gold glow — larger than clip, full radial falloff so edges stay invisible */\n    content: '';\n    position: absolute;\n    inset: -100px -100px auto auto;\n    width: 520px; height: 520px;\n    background: radial-gradient(circle at center, rgba(227,164,42,0.45) 0%, rgba(227,164,42,0.18) 30%, transparent 70%);\n    filter: blur(30px);\n    z-index: 0;\n    pointer-events: none;\n  }\n  .goal > * { position: relative; z-index: 1; }\n  .goal-label {\n    font-family: var(--f-mono);\n    font-size: 11px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--gold);\n    margin-bottom: 14px;\n    font-weight: 700;\n  }\n  .goal-num {\n    font-family: var(--f-display);\n    font-weight: 800;\n    font-size: clamp(48px, 6.5vw, 72px);\n    line-height: 0.95;\n    letter-spacing: -0.035em;\n    font-variant-numeric: tabular-nums;\n    color: #fff;\n  }\n  .goal-of {\n    font-family: var(--f-body);\n    font-size: 15px;\n    color: rgba(255,255,255,0.65);\n    margin-top: 10px;\n    font-weight: 500;\n  }\n  .goal-of b { color: #fff; font-weight: 700; }\n  .goal-of .pct { color: var(--gold); font-weight: 700; }\n\n  .rail {\n    margin-top: 22px;\n    height: 12px;\n    background: rgba(255,255,255,0.10);\n    border-radius: 999px;\n    overflow: hidden;\n    position: relative;\n  }\n  .rail-fill {\n    height: 100%;\n    background: var(--gold);\n    border-radius: 999px;\n    transition: width 1200ms cubic-bezier(.2,.7,.2,1);\n    position: relative;\n    box-shadow: 0 0 20px rgba(227,164,42,0.35);\n  }\n  .rail-fill::after {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background-image: repeating-linear-gradient(45deg, transparent 0 6px, rgba(0,0,0,0.10) 6px 7px);\n  }\n  .goal-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 18px 22px; margin-top: 26px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.14); }\n  .stat-num {\n    font-family: var(--f-display);\n    font-weight: 700;\n    font-size: 26px;\n    letter-spacing: -0.02em;\n    font-variant-numeric: tabular-nums;\n    color: #fff;\n    line-height: 1;\n  }\n  .stat-label {\n    font-family: var(--f-mono);\n    font-size: 10px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,0.55);\n    margin-top: 8px;\n    font-weight: 600;\n  }\n\n  /* ====== Payment rails grid ====== */\n  .rails {\n    max-width: 1240px;\n    margin: 40px auto 0;\n    padding: 0 32px 64px;\n  }\n  @media (max-width: 720px) {\n    .rails { margin-top: 28px; padding: 0 20px 48px; }\n  }\n  .rails-head {\n    display: flex;\n    align-items: baseline;\n    gap: 14px;\n    margin-bottom: 28px;\n    padding-bottom: 20px;\n    border-bottom: 1px solid var(--rule);\n    flex-wrap: wrap;\n  }\n  .rails-title {\n    font-family: var(--f-display);\n    font-weight: 700;\n    font-size: clamp(24px, 3vw, 36px);\n    letter-spacing: -0.025em;\n    margin: 0;\n    color: var(--navy-ink);\n  }\n  .rails-tag {\n    font-family: var(--f-mono);\n    font-size: 11px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--gold-deep);\n    font-weight: 700;\n    padding: 4px 10px;\n    border: 1px solid var(--gold);\n    background: var(--gold-soft);\n    border-radius: 4px;\n    white-space: nowrap;\n  }\n  .rails-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 16px;\n  }\n  @media (max-width: 1100px) { .rails-grid { grid-template-columns: repeat(2, 1fr); } }\n  @media (max-width: 620px) { .rails-grid { grid-template-columns: 1fr; gap: 12px; } }\n\n  .rail-card {\n    border: 1px solid var(--rule);\n    border-radius: 6px;\n    padding: 24px;\n    background: var(--paper);\n    transition: all 200ms ease;\n    position: relative;\n  }\n  .rail-card:hover {\n    border-color: var(--navy);\n    transform: translateY(-2px);\n    box-shadow: 0 10px 30px rgba(14,24,71,0.08);\n  }\n  .rail-kind {\n    display: flex;\n    just nd: #fff; color: #000; }\n    .title, .lede { color: #000; }\n  }\n\n  /* ===== Tabbed rails (v7) ===== */\n  .railtabs {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 0;\n    border-top: 1px solid var(--rule-strong);\n    border-bottom: 1px solid var(--rule-strong);\n    margin-bottom: 28px;\n    background: var(--paper);\n  }\n  .railtab {\n    appearance: none;\n    -webkit-appearance: none;\n    background: transparent;\n    border: 0;\n    border-right: 1px solid var(--rule);\n    padding: 22px 20px 20px;\n    cursor: pointer;\n    text-align: left;\n    position: relative;\n    display: grid;\n    grid-template-columns: auto 1fr;\n    grid-template-rows: auto auto;\n    column-gap: 14px;\n    row-gap: 4px;\n    color: var(--ink-soft);\n    transition: background-color 0.18s ease, color 0.18s ease;\n  }\n  .railtab:last-child { border-right: 0; }\n  .railtab::before {\n    content: '';\n    position: absolute;\n    left: 0; right: 0; bottom: -1px;\n    height: 2px;\n    background: transparent;\n    transition: background-color 0.18s ease;\n  }\n  .railtab:hover {\n    background: var(--paper-tint);\n    color: var(--ink);\n  }\n  .railtab:focus-visible {\n    outline: 2px solid var(--gold);\n    outline-offset: -2px;\n  }\n  .railtab[aria-selected=\"true\"] {\n    background: var(--paper-tint);\n    color: var(--ink);\n  }\n  .railtab[aria-selected=\"true\"]::before {\n    background: var(--gold);\n  }\n  .railtab-num {\n    grid-row: 1 / span 2;\n    align-self: center;\n    font-family: var(--f-mono);\n    font-size: 22px;\n    font-weight: 500;\n    letter-spacing: 0.02em;\n    font-variant-numeric: tabular-nums;\n    color: var(--gold-deep);\n  }\n  .railtab[aria-selected=\"true\"] .railtab-num {\n    color: var(--navy);\n  }\n  .railtab-label {\n    font-family: var(--f-display);\n    font-weight: 600;\n    font-size: 18px;\n    letter-spacing: -0.01em;\n    color: inherit;\n    line-height: 1;\n  }\n  .railtab-sub {\n    font-family: var(--f-mono);\n    font-size: 10px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n    line-height: 1;\n  }\n  @media (max-width: 640px) {\n    .railtabs { grid-template-columns: 1fr; }\n    .railtab { border-right: 0; border-bottom: 1px solid var(--rule); padding: 16px 18px; }\n    .railtab:last-child { border-bottom: 0; }\n    .railtab-num { font-size: 18px; }\n    .railtab-label { font-size: 16px; }\n  }\n\n  .railpane[hidden] { display: none; }\n  .railpane {\n    animation: railpane-in 0.22s ease-out both;\n  }\n  @keyframes railpane-in {\n    from { opacity: 0; transform: translateY(4px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n\n  /* ===== Monobank panel (button full-width, requisites + QR side-by-side) ===== */\n  .mono-cta-full { width: 100%; text-align: center; }\n  .mono-req-wrap {\n    margin-top: 14px;\n    padding-top: 14px;\n    border-top: 1px solid var(--rule);\n    display: grid;\n    grid-template-columns: minmax(0, 1fr) auto;\n    gap: 20px;\n    align-items: start;\n  }\n  .mono-req-col { min-width: 0; }\n  .mono-req-head {\n    margin: 0 0 8px;\n    font-family: var(--f-mono);\n    font-size: 10px;\n    font-weight: 700;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--gold-deep);\n  }\n  .mono-req {\n    margin: 0;\n    display: grid;\n    grid-template-columns: auto 1fr;\n    gap: 6px 14px;\n    font-family: var(--f-mono);\n    font-size: 12px;\n    line-height: 1.5;\n  }\n  .mono-req dt { color: var(--ink-mute); letter-spacing: 0.06em; white-space: nowrap; }\n  .mono-req dd { margin: 0; color: var(--ink); display: flex; flex-wrap: wrap; gap: 6px 8px; align-items: center; word-break: break-all; }\n  .mono-req code { font-family: var(--f-mono); font-size: 11px; color: var(--navy-ink); }\n  .mono-req .mini-copy {\n    padding: 3px 9px;\n    font-family: var(--f-mono);\n    font-size: 9px;\n    font-weight: 700;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    background: transparent;\n    border: 1px solid var(--rule-strong);\n    border-radius: 2px;\n    color: var(--ink-soft);\n    cursor: pointer;\n    line-height: 1.1;\n    transition: background-color 160ms ease, color 160ms ease, border-color 160ms ease;\n  }\n  .mono-req .mini-copy:hover { background: var(--gold-soft); color: var(--navy); border-color: var(--gold); }\n  .mono-req-wrap img.mono-qr.mono-pickup-qr {\n    width: 128px; height: 128px; padding: 6px;\n    background: #fff; border: 1px solid var(--rule-strong); border-radius: 4px;\n    flex: none;\n  }\n  @media (max-width: 640px) {\n    .mono-req-wrap { display: none; }\n  }\n\n  /* ===== Mobile: interleave tabs with their panels ===== */\n  @media (max-width: 640px) {\n    .rails { display: flex; flex-direction: column; }\n    .railtabs {\n      display: contents;\n    }\n    .railtabs[role=\"tablist\"] + * { order: 10; }\n    .railtab { margin: 0; }\n    #tab-mono   { order: 1; }\n    #pane-mono  { order: 2; }\n    #tab-paypal { order: 3; }\n    #pane-paypal{ order: 4; }\n    #tab-crypto { order: 5; }\n    #pane-crypto{ order: 6; }\n    .rails-head { order: 0; }\n    .railtab { border-right: 0; border-bottom: 1px solid var(--rule); }\n    .railpane { margin-bottom: 12px; }\n    /* Hide duplicate card-level headers on mobile — the tab already labels the pane.\n       Inside the crypto grid each card labels a distinct currency, so keep those. */\n    #pane-mono > .rail-card > .rail-kind,\n    #pane-paypal > .rail-card > .rail-kind { display: none; }\n  }\n  /* ===== Bilingual typography (UA dominant, EN muted) ===== */\n  .title-en {\n    display: block;\n    margin-top: 10px;\n    font-family: var(--f-display);\n    font-weight: 500;\n    font-size: 16px;\n    letter-spacing: 0.02em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,0.5);\n    line-height: 1.2;\n  }\n  .lede-en {\n    margin-top: 14px;\n    font-family: var(--f-serif, var(--f-display));\n    font-size: 14px;\n    line-height: 1.6;\n    color: rgba(255,255,255,0.55);\n    font-style: italic;\n    letter-spacing: 0.005em;\n  }\n  .lede-en b { color: rgba(255,255,255,0.72); font-weight: 600; font-style: normal; }\n  .lede-en .hl { color: var(--gold-warm); font-weight: 600; font-style: normal; }\n\n  .meta-en { color: var(--ink-mute); font-weight: 400; letter-spacing: 0.08em; font-size: 10px; }\n\n  .goal-of-en { color: var(--ink-mute); font-weight: 400; font-size: 11px; letter-spacing: 0.06em; margin-left: 2px; }\n  .stat-en { color: var(--ink-mute); font-weight: 400; letter-spacing: 0.08em; }\n\n  .rails-title-en {\n    display: block;\n    margin-top: 4px;\n    font-family: var(--f-mono);\n    font-weight: 500;\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n  }\n\n  .req-head-en { color: var(--ink-mute); font-weight: 500; letter-spacing: 0.12em; }\n  .mono-req dt .dt-en { color: var(--ink-mute); font-weight: 400; letter-spacing: 0.04em; font-size: 10px; text-transform: uppercase; }\n  .mono-req dd .dd-en { color: var(--ink-mute); font-weight: 400; font-size: 11px; letter-spacing: 0.02em; }\n\n  .btn-en { font-family: var(--f-mono); font-weight: 500; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.72; margin: 0 6px 0 4px; }\n\n  /* Monobank card-number line (above jar URL, always visible) */\n  .mono-card {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    flex-wrap: wrap;\n    padding: 14px;\n    margin-bottom: 10px;\n    background: var(--paper-tint);\n    border-left: 3px solid var(--navy);\n    border-radius: 4px;\n    font-family: var(--f-mono);\n  }\n  .mono-card-label {\n    font-size: 10px;\n    font-weight: 700;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n  }\n  .mono-card-num {\n    font-family: var(--f-mono);\n    font-size: 15px;\n    letter-spacing: 0.08em;\n    color: var(--navy-ink); >\n            <button class=\"rail-btn primary copy-btn\" data-copy=\"BPKN5D3tc6tXaHBNBxknXNoKf6yhdVdL3yVr8fSPnVqx\">Copy address<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Trust strip -->\n  <div class=\"trust\">\n    <div class=\"trust-inner\">\n      <div class=\"trust-mark\">◆<\u002Fdiv>\n      <div class=\"trust-body\">\n        <b>Збір ведеться приватно Юрієм Клековкіним. Кожна копійка йде на одну конкретну машину та її спорядження.<\u002Fb>\n        <span>Fundraiser is run privately by Iurii Klekovkin. Every cent goes to one specific vehicle and its kit. No overhead. Receipts on request.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n    <!-- About / story -->\n  <section class=\"about\" aria-labelledby=\"about-title\">\n    <div class=\"about-head\">\n      <h2 class=\"about-title\" id=\"about-title\">Про збір · About this fundraiser<\u002Fh2>\n      <span class=\"about-tag\">Контекст · Context<\u002Fspan>\n    <\u002Fdiv>\n    <figure class=\"about-figure\">\n      <img src=\"photo.jpg\" alt=\"Старший солдат, 159 окрема механізована бригада\" loading=\"lazy\">\n      <figcaption class=\"about-figcaption\">\n        <span class=\"fignum\">Fig. 01 · На позиції<\u002Fspan>\n        <span class=\"figtitle\">Старший солдат · 159 ОМБР · Збройні Сили України<\u002Fspan>\n        <span class=\"figmeta\">Front line · 2026<\u002Fspan>\n      <\u002Ffigcaption>\n    <\u002Ffigure>\n    <div class=\"about-cols\">\n      <div class=\"about-col ua\">\n        <span class=\"lang\">UA<\u002Fspan>\n        <p>Я — старший солдат Збройних Сил України, служу в <b>159 окремій механізованій бригаді<\u002Fb>. Наш підрозділ потребує пікап типу Nissan Navara для виконання бойових завдань.<\u002Fp>\n        <p>Пікап необхідний для оперативного постачання, евакуації та переміщення особового складу. Надійний транспорт — це збережені життя наших бійців.<\u002Fp>\n        <p>Ціль збору: <b>$10,000 USD<\u002Fb>. Кожен донат наближає нас до мети.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"about-col en\">\n        <span class=\"lang\">EN<\u002Fspan>\n        <p>I am a senior soldier of the Armed Forces of Ukraine, serving in the <b>159th Separate Mechanized Brigade<\u002Fb>. Our unit needs a pickup truck (Nissan Navara type) to fulfill combat missions.<\u002Fp>\n        <p>The pickup is essential for rapid resupply, evacuation, and troop movement. Reliable transportation saves lives of our soldiers.<\u002Fp>\n        <p>Fundraising goal: <b>$10,000 USD<\u002Fb>. Every donation brings us closer.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer class=\"foot\">\n    <div class=\"foot-inner\">\n      <div>© Iurii Klekovkin · <a href=\"index.html\">cv<\u002Fa> · <a href=\"https://www.159ombr.army/\" target=\"_blank\" rel=\"noopener noreferrer\">159ombr.army<\u002Fa><\u002Fdiv>\n      <div>Приватний збір · No overhead · Receipts on request<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<div id=\"toast\">Copied<\u002Fdiv>\n\n<script>\n/* ====== Presets & amount input ====== */\n(function() {\n  const host = document.getElementById('presets');\n  const input = document.getElementById('amt');\n  if (!host || !input) return;\n  host.querySelectorAll('[data-v]').forEach(btn => {\n    btn.addEventListener('click', () => {\n      host.querySelectorAll('[data-v]').forEach(b => b.classList.toggle('active', b === btn));\n      input.value = btn.dataset.v;\n    });\n  });\n  input.addEventListener('input', () => {\n    host.querySelectorAll('[data-v]').forEach(b => b.classList.toggle('active', b.dataset.v === input.value));\n  });\n})();\n\n/* ====== Subscription tabs (hidden but wired) ====== */\ndocument.querySelectorAll('.tab').forEach(tab => {\n  tab.addEventListener('click', () => {\n    tab.parentElement.querySelectorAll('.tab').forEach(s => s.classList.toggle('active', s === tab));\n  });\n});\n\n/* ====== Copy-to-clipboard ====== */\nfunction showToast(msg) {\n  const t = document.getElementById('toast');\n  t.textContent = msg;\n  t.classList.add('show');\n  clearTimeout(showToast._t);\n  showToast._t = setTimeout(() => t.classList.remove('show'), 1600);\n}\ndocument.addEventListener('click', (e) => {\n  const el = e.target.closest('[data-copy], .copy-btn');\n  if (!el) return;\n  const text = el.dataset.copy;\n  if (!text) return;\n  const ok = () => showToast('✓ Скопійовано · Copied · ' + (text.length > 24 ? text.slice(0, 18) + '…' : text));\n  if (navigator.clipboard && navigator.clipboard.writeText) {\n    navigator.clipboard.writeText(text).then(ok).catch(() => {\n      const ta = document.createElement('textarea');\n      ta.value = text; document.body.appendChild(ta); ta.select();\n      try { document.execCommand('copy'); ok(); } catch(_){}\n      document.body.removeChild(ta);\n    });\n  }\n});\n\n/* ====== Progress — live multi-chain + donations counter ====== */\n(function() {\n  // ---- Config ----\n  var GOAL_USD     = 10000;\n  var MANUAL_USD   = 0;      // fiat totals (PayPal + Monobank) — update manually\n  var START_DATE   = new Date('2026-04-19T00:00:00Z');\n\n  var MONO_PROXY   = 'https://jar-proxy.klekovkin.workers.dev/';\n  var UAH_USD_RATE = 41.5; // fallback if CoinGecko unreachable\n  var USDT_TRC20   = 'TJFg3HdwkvSp7HApo689Grk34nUTf1yQ1k';\n  var USDT_CONTRACT= 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';\n  var BTC_ADDR     = 'bc1q0ggqp5ckf24kzy8ea4hkkrmqa8u0q85t8tvtw2';\n  var ETH_ADDR     = '0x715D61d14a23Ca3145AF189F158BB1A09B6a547A';\n  var ATOM_ADDR    = 'cosmos16xhavahutupwhrgxuzx7uwc5jm8q68ckl6w474';\n  var SOL_ADDR     = 'BPKN5D3tc6tXaHBNBxknXNoKf6yhdVdL3yVr8fSPnVqx';\n  var SOL_RPC      = 'https://solana-rpc.publicnode.com';\n\n  function fmt(n) { return '$' + Math.round(n).toLocaleString('en-US'); }\n\n  function fmtAgo(tsSec) {\n    var diff = Math.max(0, Math.floor(Date.now() / 1000 - tsSec));\n    if (diff < 60) return '<1 хв · <1m';\n    if (diff < 3600) { var mi = Math.floor(diff / 60); return mi + ' хв · ' + mi + 'm'; }\n    if (diff < 86400) { var hr = Math.floor(diff / 3600); return hr + ' год · ' + hr + 'h'; }\n    var dys = Math.floor(diff / 86400);\n    return dys + ' дн · ' + dys + 'd';\n  }\n\n  function render(usd, donations, extras) {\n    var total = Math.floor(usd);\n    var pct = Math.min(100, (total / GOAL_USD) * 100);\n    var f = document.getElementById('fill');\n    var n = document.getElementById('num');\n    var p = document.getElementById('pct');\n    var g = document.getElementById('goal');\n    var d = document.getElementById('days');\n    var c = document.getElementById('count');\n    var pEl2 = document.getElementById('pace');\n    var lEl = document.getElementById('last');\n    var bEl = document.getElementById('biggest');\n    if (f) f.style.width = pct + '%';\n    if (n) n.textContent = fmt(total);\n    if (p) p.textContent = pct.toFixed(1) + '%';\n    if (g) g.textContent = fmt(GOAL_USD);\n    var daysSince = Math.max(0, Math.floor((Date.now() - START_DATE.getTime()) / 86400000));\n    if (d) d.textContent = daysSince;\n    if (c && donations !== null && donations !== undefined) c.textContent = donations;\n    if (pEl2) {\n      if (total > 0) {\n        var divisor = Math.max(1, daysSince);\n        pEl2.textContent = '$' + Math.round(total / divisor).toLocaleString('en-US') + '/\\u0434\\u0435\\u043d\\u044c';\n      } else {\n        pEl2.textContent = '—';\n      }\n    }\n    if (lEl) lEl.textContent = (extras && extras.lastTs) ? fmtAgo(extras.lastTs) : '—';\n    if (bEl) {\n      if (extras && extras.maxUah && extras.uahUsd) {\n        bEl.textContent = '$' + Math.round(extras.maxUah / extras.uahUsd).toLocaleString('en-US');\n      } else {\n        bEl.textContent = '—';\n      }\n    }\n  }\n\n  // ---- Price fetch (one call) ----\n  function fetchPrices() {\n    return fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,cosmos,solana,tether&vs_currencies=usd')\n      .then(function(r) { return r.json(); })\n      .catch(function() { return {}; });\n  }\n\n  // ---- On-chain balance fetchers (return {usd, tx}) ----\n  function fetchUsdt(prices) {\n    var p1 = fetch('https://api.trongrid.io/v1/accounts/' + USDT_TRC20)\n      .then(function(r) { return r.json(); })\n      .then(function(d) {\n        if (!d.data || !d.data[0] || !d.data[0].trc20) return 0;\n        var ts = d.data[0].trc20;\n        for (var i = 0; i < ts.length; i++) if (ts[i][USDT_CONTRACT]) return parseInt(ts[i][USDT_CONTRACT]) / 1e6;\n        return 0;\n      }).catch(function() { return 0; });\n    var p2 = fetch('https://api.trongrid.io/v1/accounts/' + USDT_TRC20 + '/transactions/trc20?only_to=true&limit=200&contract_address=' + USDT_CONTRACT)\n      .then(function(r) { return r.json(); })\n      .then(function(d) { return (d.data || []).length; })\n      .catch(function() { return 0; });\n    return Promise.all([p1, p2]).then(function(a) {\n      return { usd: a[0] * ((prices.tether && prices.tether.usd) || 1), tx: a[1] };\n    });\n  }\n\n  function fetchBtc(prices) {\n    return fetch('https://blockstream.info/api/address/' + BTC_ADDR)\n      .then(function(r) { return r.json(); })\n      .then(function(d) {\n        var stats = d.chain_stats || {};\n        var btc = ((stats.funded_txo_sum || 0) - (stats.spent_txo_sum || 0)) / 1e8;\n        var tx  = stats.funded_txo_count || 0;\n        var px  = (prices.bitcoin && prices.bitcoin.usd) || 0;\n        return { usd: btc * px, tx: tx };\n      })\n      .catch(function() { return { usd: 0, tx: 0 }; });\n  }\n\n  function fetchEth(prices) {\n    var p1 = fetch('https://eth.blockscout.com/api/v2/addresses/' + ETH_ADDR)\n      .then(function(r) { return r.json(); })\n      .then(function(d) { return parseFloat(d.coin_balance || '0') / 1e18; })\n      .catch(function() { return 0; });\n    var p2 = fetch('https://eth.blockscout.com/api/v2/addresses/' + ETH_ADDR + '/transactions?filter=to')\n      .then(function(r) { return r.json(); })\n      .then(function(d) { return (d.items || []).length; })\n      .catch(function() { return 0; });\n    return Promise.all([p1, p2]).then(function(a) {\n      return { usd: a[0] * ((prices.ethereum && prices.ethereum.usd) || 0), tx: a[1] };\n    });\n  }\n\n  function fetchAtom(prices) {\n    var p1 = fetch('https://rest.cosmos.directory/cosmoshub/cosmos/bank/v1beta1/balances/' + ATOM_ADDR)\n      .then(function(r) { return r.json(); })\n      .then(function(d) {\n        var bs = d.balances || [];\n        for (var i = 0; i < bs.length; i++) if (bs[i].denom === 'uatom') return parseInt(bs[i].amount) / 1e6;\n        return 0;\n      }).catch(function() { return 0; });\n    var p2 = fetch('https://rest.cosmos.directory/cosmoshub/cosmos/tx/v1beta1/txs?events=transfer.recipient%3D%27' + ATOM_ADDR + '%27&pagination.limit=100')\n      .then(function(r) { return r.json(); })\n      .then(function(d) { return (d.txs || []).length; })\n      .catch(function() { return 0; });\n    return Promise.all([p1, p2]).then(function(a) {\n      return { usd: a[0] * ((prices.cosmos && prices.cosmos.usd) || 0), tx: a[1] };\n    });\n  }\n\n  function fetchMono(prices) {\n    var uahUsd = (prices.tether && prices.tether.uah) || UAH_USD_RATE;\n    return fetch(MONO_PROXY)\n      .then(function(r) { return r.ok ? r.json() : null; })\n      .then(function(d) {\n        if (!d || typeof d.balance_uah !== 'number') return { usd: 0, tx: 0, lastTs: null, maxUah: null, uahUsd: uahUsd };\n        var tx = (typeof d.donors_count === 'number' && d.donors_count >= 0) ? d.donors_count : 0;\n        var lastTs = (typeof d.last_donation_at === 'number' && d.last_donation_at > 0) ? d.last_donation_at : null;\n        var maxUah = (typeof d.max_donation_uah === 'number' && d.max_donation_uah > 0) ? d.max_donation_uah : null;\n        return { usd: d.balance_uah / uahUsd, tx: tx, lastTs: lastTs, maxUah: maxUah, uahUsd: uahUsd };\n      })\n      .catch(function() { return { usd: 0, tx: 0, lastTs: null, maxUah: null, uahUsd: uahUsd }; });\n  }\n  function fetchSol(prices) {\n    var headers = { 'Content-Type': 'application/json' };\n    var bal = fetch(SOL_RPC, {\n      method: 'POST', headers: headers,\n      body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'getBalance', params: [SOL_ADDR] })\n    }).then(function(r) { return r.json(); })\n      .then(function(d) { return (d.result && d.result.value ? d.result.value : 0) / 1e9; })\n      .catch(function() { return 0; });\n    var tx = fetch(SOL_RPC, {\n      method: 'POST', headers: headers,\n      body: JSON.stringify({ jsonrpc: '2.0', id: 2, method: 'getSignaturesForAddress', params: [SOL_ADDR, { limit: 1000 }] })\n    }).then(function(r) { return r.json(); })\n      .then(function(d) { return (d.result || []).length; })\n      .catch(function() { return 0; });\n    return Promise.all([bal, tx]).then(function(a) {\n      return { usd: a[0] * ((prices.solana && prices.solana.usd) || 0), tx: a[1] };\n    });\n  }\n\n  // ---- Orchestrate ----\n  render(MANUAL_USD, null, null);\n  fetchPrices().then(function(prices) {\n    Promise.all([fetchMono(prices), fetchUsdt(prices), fetchBtc(prices), fetchEth(prices), fetchAtom(prices), fetchSol(prices)])\n      .then(function(rs) {\n        var totalUsd = MANUAL_USD + rs[0].usd + rs[1].usd + rs[2].usd + rs[3].usd + rs[4].usd + rs[5].usd;\n        var totalTx  = rs[0].tx + rs[1].tx + rs[2].tx + rs[3].tx + rs[4].tx + rs[5].tx;\n        render(totalUsd, totalTx, rs[0]);\n      });\n  });\n})();\n<\u002Fscript>\n\n\n\n\n<script>\n(function() {\n  var tabs = document.querySelectorAll('.railtab');\n  var panes = document.querySelectorAll('.railpane');\n  if (!tabs.length) return;\n  function activate(tab) {\n    tabs.forEach(function(t) {\n      var on = t === tab;\n      t.setAttribute('aria-selected', on ? 'true' : 'false');\n      t.setAttribute('tabindex', on ? '0' : '-1');\n    });\n    var paneId = tab.getAttribute('aria-controls');\n    panes.forEach(function(p) {\n      if (p.id === paneId) { p.hidden = false; }\n      else { p.hidden = true; }\n    });\n  }\n  tabs.forEach(function(tab, i) {\n    tab.addEventListener('click', function() { activate(tab); });\n    tab.addEventListener('keydown', function(e) {\n      var idx = i;\n      if (e.key === 'ArrowRight') idx = (i + 1) % tabs.length;\n      else if (e.key === 'ArrowLeft') idx = (i - 1 + tabs.length) % tabs.length;\n      else if (e.key === 'Home') idx = 0;\n      else if (e.key === 'End') idx = tabs.length - 1;\n      else return;\n      e.preventDefault();\n      tabs[idx].focus();\n      activate(tabs[idx]);\n    });\n  });\n\n  function activateFromHash() {\n    var h = (location.hash || '').replace('#', '');\n    if (!h) return;\n    var match = null;\n    tabs.forEach(function(t) {\n      if (t.id === h || t.getAttribute('data-tab') === h) match = t;\n    });\n    if (match) {\n      activate(match);\n      var rails = document.querySelector('.rails') || match;\n      rails.scrollIntoView({ behavior: 'smooth', block: 'start' });\n    }\n  }\n  window.addEventListener('hashchange', activateFromHash);\n  activateFromHash();\n})();\n<\u002Fscript>\n<\u002Fbody><\u002Fhtml>"</script>
